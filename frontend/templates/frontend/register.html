{% extends 'frontend/base.html' %}

{% block title %}Register | Civic Issue Portal{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; margin: 2rem 0;">
    <div class="glass-card" style="width: 100%; max-width: 500px;">
        <h2 style="text-align: center; margin-bottom: 2rem; font-weight: 800; font-size: 1.8rem;">Create an Account</h2>
        
        <div id="error-msg" style="color: var(--danger); font-size: 0.9rem; margin-bottom: 1rem; display: none;"></div>

        <form id="register-form">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" class="form-control" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control">
                </div>
                <div class="form-group">
                    <label for="phone_number">Phone Number</label>
                    <input type="text" id="phone_number" class="form-control" placeholder="10 digits" required maxlength="10">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Min 8 chars, 1 number, 1 special char" required>
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" class="form-control" required>
                    <option value="CITIZEN" selected>Citizen</option>
                    <option value="WARD_MEMBER">Ward Member</option>
                    <option value="DEPARTMENT_HEAD">Department Head</option>
                </select>
            </div>

            <div class="form-group" id="ward-group">
                <label for="ward">Select Ward</label>
                <select id="ward" class="form-control">
                    <option value="">Loading wards...</option>
                </select>
            </div>

            <div class="form-group" id="aadhaar-group">
                <label for="aadhaar_id">Aadhaar ID</label>
                <input type="text" id="aadhaar_id" class="form-control" placeholder="12 digits" maxlength="12">
            </div>

            <div class="form-group">
                <label for="address">Address (Optional)</label>
                <textarea id="address" class="form-control" rows="2"></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="reg-btn">Sign Up</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    // Dynamic Role Form Toggle
    const roleSelect = document.getElementById('role');
    const wardGroup = document.getElementById('ward-group');
    const aadhaarGroup = document.getElementById('aadhaar-group');

    roleSelect.addEventListener('change', (e) => {
        if(e.target.value === 'CITIZEN') {
            aadhaarGroup.style.display = 'block';
            wardGroup.style.display = 'block';
        } else if(e.target.value === 'WARD_MEMBER') {
            aadhaarGroup.style.display = 'none';
            wardGroup.style.display = 'block';
        } else {
            aadhaarGroup.style.display = 'none';
            wardGroup.style.display = 'none';
        }
    });

    // Fetch Wards
    try {
        const res = await fetch('/api/wards/');
        const responseData = await res.json();
        // Check for pagination wrapper
        const data = responseData.results || responseData;
        
        const wardSelect = document.getElementById('ward');
        wardSelect.innerHTML = '<option value="">Select a Ward</option>';
        data.forEach(w => {
            wardSelect.innerHTML += `<option value="${w.id}">${w.ward_name}</option>`;
        });
    } catch(e) {
        console.error("Failed to load wards");
    }
});

document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    const err = document.getElementById('error-msg');
    
    btn.innerHTML = '<div class="loader"></div>';
    btn.disabled = true;
    err.style.display = 'none';

    const payload = {
        username: document.getElementById('username').value,
        full_name: document.getElementById('full_name').value,
        phone_number: document.getElementById('phone_number').value,
        email: document.getElementById('email').value || null,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value,
        address: document.getElementById('address').value || null
    };

    const ward = document.getElementById('ward').value;
    if(ward) payload.ward = parseInt(ward);

    if(payload.role === 'CITIZEN') {
        payload.aadhaar_id = document.getElementById('aadhaar_id').value;
    }

    try {
        const res = await fetch('/api/users/register/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        
        const data = await res.json();
        
        if (res.ok) {
            // Success, auto-login or redirect
            window.location.href = "{% url 'login_page' %}?registered=true";
        } else {
            let errorText = '';
            for (const key in data) {
                errorText += `<b>${key}</b>: ${data[key][0]}<br>`;
            }
            err.innerHTML = errorText;
            err.style.display = 'block';
            btn.innerHTML = 'Sign Up';
            btn.disabled = false;
        }
    } catch (e) {
        err.innerText = 'Network Error. Could not register.';
        err.style.display = 'block';
        btn.innerHTML = 'Sign Up';
        btn.disabled = false;
    }
});
</script>
{% endblock %}
