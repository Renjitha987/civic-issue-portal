{% extends 'frontend/base.html' %}

{% block title %}Submit Complaint | Civic Issue Portal{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-card" style="width: 100%; max-width: 600px;">
        <h2 style="text-align: center; margin-bottom: 2rem;">Report a Civic Issue</h2>
        
        <div id="error-msg" style="color: var(--danger); font-size: 0.9rem; margin-bottom: 1rem; display: none;"></div>

        <form id="complaint-form">
            <div class="form-group">
                <label for="issue_category">Department / Type of Issue</label>
                <select id="issue_category" class="form-control" required>
                    <option value="" disabled selected>Loading departments...</option>
                </select>
                <small style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.4rem; display: block;">
                    Select the department that best matches your concern.
                </small>
            </div>
            
            <div class="form-group">
                <label for="location">Exact Location / Landmark</label>
                <input type="text" id="location" class="form-control" placeholder="e.g. Near 3rd Cross Street, Downtown" required>
            </div>

            <div class="form-group">
                <label for="description">Detailed Description</label>
                <textarea id="description" class="form-control" rows="5" placeholder="Please describe the issue in detail (minimum 10 characters)..." required minlength="10"></textarea>
            </div>
            
            <div class="form-group">
                <label for="image">Issue Image (Optional)</label>
                <input type="file" id="image" class="form-control" accept=".jpg,.jpeg,.png">
                <small style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.25rem; display: block;">Allowed: JPG, PNG. Max size: 5MB.</small>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="submit-btn">Submit Ticket</button>
            <a href="{% url 'citizen_dashboard' %}" class="btn" style="width: 100%; margin-top: 0.5rem; background: var(--surface-color); color: var(--text-muted);">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    if(localStorage.getItem('user_role') !== 'CITIZEN') {
        alert("Only registered citizens can directly submit new complaints.");
        window.location.href = "{% url 'home' %}";
        return;
    }

    // Dynamically load ALL departments from the database (handles pagination)
    try {
        let depts = [];
        let url = '/api/departments/';
        const token = localStorage.getItem('access_token');
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

        while(url) {
            const res = await fetch(url, { headers });
            const responseData = await res.json();
            if(responseData.results) {
                depts.push(...responseData.results);
                url = responseData.next || null;
            } else {
                depts = responseData;
                url = null;
            }
        }

        const select = document.getElementById('issue_category');
        select.innerHTML = '<option value="" disabled selected>Select department...</option>';

        if(depts && depts.length > 0) {
            depts.forEach(d => {
                select.innerHTML += `<option value="${d.department_name}">${d.department_name}${d.description ? ' — ' + d.description : ''}</option>`;
            });
        } else {
            select.innerHTML = '<option value="" disabled>No departments available. Contact admin.</option>';
        }
    } catch(e) {
        console.error("Failed to load departments:", e);
        const select = document.getElementById('issue_category');
        select.innerHTML = '<option value="" disabled>Failed to load. Please refresh.</option>';
    }
});

document.getElementById('complaint-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    
    btn.innerHTML = '<div class="loader"></div>';
    btn.disabled = true;
    err.style.display = 'none';

    const imageFile = document.getElementById('image').files[0];
    if (imageFile && imageFile.size > 5 * 1024 * 1024) {
        err.innerText = "Detailed image size cannot exceed 5MB.";
        err.style.display = 'block';
        btn.innerHTML = 'Submit Ticket'; btn.disabled = false;
        return;
    }

    const payload = new FormData();
    payload.append('issue_category', document.getElementById('issue_category').value);
    payload.append('location', document.getElementById('location').value);
    payload.append('description', document.getElementById('description').value);
    if (imageFile) {
        payload.append('image', imageFile);
    }

    try {
        const headers = getAuthHeaders();
        delete headers['Content-Type']; // Let browser set boundary automatically
        const response = await fetch(`${API_URL}/complaints/`, {
            method: 'POST',
            body: payload,
            headers: headers
        });
        
        const data = await response.json();
        
        if (response.ok) {
            window.location.href = "{% url 'citizen_dashboard' %}";
        } else {
            let errorText = '';
            if (typeof data === 'string') {
                errorText = data;
            } else if (Array.isArray(data)) {
                errorText = data.join('<br>');
            } else if (data.detail) {
                errorText = data.detail;
            } else {
                for (const key in data) {
                    if (Array.isArray(data[key])) {
                        errorText += `<b>${key}</b>: ${data[key][0]}<br>`;
                    } else {
                        errorText += `<b>${key}</b>: ${data[key]}<br>`;
                    }
                }
            }
            err.innerHTML = errorText || 'Failed to submit the complaint.';
            err.style.display = 'block';
            btn.innerHTML = 'Submit Ticket';
            btn.disabled = false;
        }
    } catch (e) {
        err.innerText = 'Error: ' + (e.message || e);
        err.style.display = 'block';
        btn.innerHTML = 'Submit Ticket';
        btn.disabled = false;
    }
});
</script>
{% endblock %}
