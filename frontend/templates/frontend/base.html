<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Civic Issue Portal{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">

    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg-color: #0b0f1a;
            --surface-color: rgba(17, 24, 39, 0.7);
            --surface-hover: rgba(31, 41, 55, 0.8);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #f87171;
            --success: #34d399;
            --warning: #fbbf24;
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(192, 132, 252, 0.05) 0%, transparent 40%);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .navbar {
            backdrop-filter: blur(12px);
            background: rgba(11, 15, 26, 0.8);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            color: var(--text-color);
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
            width: 100%;
        }

        /* Inputs & Buttons */
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-color);
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            box-shadow: 0 4px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px -4px rgba(99, 102, 241, 0.5);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .status-badge {
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        
        .status-Pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.2); }
        .status-Resolved { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-Escalated { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .status-Forwarded { background: rgba(99, 102, 241, 0.1); color: var(--primary-light); border: 1px solid rgba(99, 102, 241, 0.2); }
        .status-InProgress { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.2); }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <!-- Government Portal Header -->
    <div class="gov-header" style="background: linear-gradient(to right, #0a3a82, #1456a3); font-family: 'Inter', sans-serif; position: relative;">
        <!-- Faint background pattern using a CSS gradient -->
        <div style="position: absolute; top: 0; right: 0; bottom: 0; left: 0; background: linear-gradient(135deg, rgba(10, 58, 130, 0.2) 0%, rgba(20, 86, 163, 0.4) 100%); opacity: 0.8; pointer-events: none;"></div>
        
        <div style="max-width: 1400px; margin: 0 auto; padding: 0.5rem 1.5rem; display: flex; justify-content: space-between; align-items: stretch; position: relative; z-index: 1;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Emblem_of_India.svg" alt="Satyameva Jayate" style="height: 65px; filter: brightness(0) invert(1);">
                <div>
                    <h1 style="color: white; font-size: 1.3rem; font-weight: 700; margin: 0; letter-spacing: 0.5px; text-transform: uppercase;">National Government Services Portal</h1>
                    <p style="color: rgba(255,255,255,0.9); font-size: 0.85rem; margin: 0;">Find Government Services Faster</p>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end; padding-top: 5px;">
                <div style="display: flex; gap: 15px; font-size: 0.75rem; color: white; align-items: center;">
                    <a href="#" style="color: white; text-decoration: none;">Skip to main content</a>
                    <div style="display: flex; gap: 8px;">
                        <a href="#" style="color: white; text-decoration: none;">+A</a>
                        <a href="#" style="color: white; text-decoration: none;">A</a>
                        <a href="#" style="color: white; text-decoration: none;">-A</a>
                    </div>
                    <div style="display: flex; gap: 4px;">
                        <div style="width: 12px; height: 12px; background: black; border: 1px solid white; cursor: pointer;"></div>
                        <div style="width: 12px; height: 12px; background: white; border: 1px solid black; cursor: pointer;"></div>
                    </div>
                    <a href="#" style="color: #fde047; text-decoration: none;">हिन्दी</a>
                </div>
                <div style="text-align: right; margin-top: auto; padding-bottom: 5px; display: flex; flex-direction: column; align-items: flex-end; line-height: 1;">
                    <span style="color: rgba(255,255,255,0.9); font-size: 0.7rem; font-style: italic; margin-bottom: 2px;">an initiative under</span>
                    <div style="font-weight: 900; font-size: 1.3rem; letter-spacing: -0.5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">
                        <span style="color: #ec4899;">in</span><span style="color: #22c55e;">d</span><span style="color: #eab308;">i</span><span style="color: #3b82f6;">a</span><span style="color: white;">.gov.in</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <a href="{% url 'home' %}" class="navbar-brand">Civic Portal</a>
        <div class="nav-links" id="nav-container">
            <a href="{% url 'login_page' %}" id="nav-login">Login</a>
            <a href="{% url 'register_page' %}" id="nav-register">Register</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Core Authenticated JS -->
    <script>
        const API_URL = '/api';
        
        function getAuthHeaders() {
            const token = localStorage.getItem('access_token');
            const headers = {
                'Content-Type': 'application/json'
            };
            if(token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            return headers;
        }

        function checkAuth() {
            const token = localStorage.getItem('access_token');
            const role = localStorage.getItem('user_role');
            const nav = document.getElementById('nav-container');
            
            if (token && role) {
                let dashboardUrl = '{% url "citizen_dashboard" %}';
                if(role === 'ADMIN') dashboardUrl = '{% url "admin_dashboard" %}';
                if(role === 'WARD_MEMBER') dashboardUrl = '{% url "ward_member_dashboard" %}';
                if(role === 'DEPARTMENT_HEAD') dashboardUrl = '{% url "department_head_dashboard" %}';
                
                nav.innerHTML = `
                    <a href="${dashboardUrl}" style="color:var(--primary-light);">Dashboard</a>
                    <a href="#" onclick="logout()">Logout</a>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user_role');
            window.location.href = "{% url 'home' %}";
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });


        async function fetchAPI(endpoint, options = {}) {
            const authHeaders = getAuthHeaders();
            
            // If body is FormData, don't set Content-Type (fetch will set it with boundary)
            if (options.body && options.body instanceof FormData) {
                delete authHeaders['Content-Type'];
            }
            
            options.headers = { ...authHeaders, ...options.headers };
            
            try {
                const url = endpoint.startsWith('http') ? endpoint : `${API_URL}${endpoint}`;
                const response = await fetch(url, options);
                
                let data = null;
                if(response.status !== 204) {
                    const text = await response.text();
                    try {
                        data = text ? JSON.parse(text) : null;
                    } catch(e) {
                        console.warn("Response not JSON", text);
                        data = { detail: text };
                    }
                }
                
                if(response.status === 401 && !endpoint.includes('login')) {
                    logout();
                }
                return { response, data };
            } catch (err) {
                console.error("API error", err);
                return { response: {ok: false, statusText: err.message}, data: {error: err.message} };
            }
        }

        async function loadAuthImage(url, elementId, styles = "") {
            if (!url) return;
            const container = document.getElementById(elementId);
            if (!container) return;
            
            try {
                const response = await fetch(url, { headers: getAuthHeaders() });
                if (response.ok) {
                    const blob = await response.blob();
                    const objectUrl = URL.createObjectURL(blob);
                    container.innerHTML = `<a href="${objectUrl}" target="_blank"><img src="${objectUrl}" style="${styles || 'width: 50px; height: 50px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border);'}"></a>`;
                } else {
                    container.innerHTML = '<span style="font-size:0.7rem; color:var(--danger);">Error</span>';
                }
            } catch (e) {
                container.innerHTML = '<span style="font-size:0.7rem; color:var(--danger);">Err</span>';
            }
        }
    </script>
    {% block scripts %}{% endblock %}
    <script src="https://unpkg.com/lucide@latest" defer></script>
</body>
</html>
